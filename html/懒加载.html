<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        .box {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            grid-gap: 30px;
            grid-auto-rows: 300px;
        }
        .box .normal {
            background-color: palegreen;
            border-radius: 20px;
            overflow: hidden;
        }
        .box .normal img {
            height: 300px;
            width: 100%;
            object-fit: cover;
        }

    </style>
</head>
<body>
    <div class="box">
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal"></div>
        <div class="normal image">
            <img data-src="./0.jpg"></img>
        </div>
        <div class="normal image">
            <img data-src="./1.jpg"></img>
        </div>
        <div class="normal image">
            <img data-src="./2.jpg"></img>
        </div>
        <div class="normal image">
            <img data-src="./2.jpg"></img>
        </div>
        <div class="normal image">
            <img data-src="./3.jpg"></img>
        </div>
        <div class="normal image">
            <img data-src="./5.jpg"></img>
        </div>
        <div class="normal image">
            <img data-src="./4.jpg"></img>
        </div>
    </div>
    <script>
        /**
         * 重点说一下这个api：IntersectionObserver
         * 1. IntersectionObserver.observe(element) 这里传的元素
         * 2. observer.unobserve 不再监听
         * 3. new IntersectionObserver((changes) => { 是一个数组，要遍历获取
         * 4. changes.target 获取当前元素
         * 5. changes.isIntersecting 是否进入视口
         * 6. 讲一下元素上面的属性data-xxx，这样就可以通过dataset获取到，否则你要通过getAttribute获取
         */
        function lazyLoad() {
            const observer = new IntersectionObserver((changes) => {
                changes.forEach(change => {
                    console.log(change.isIntersecting)
                    console.log(change.target)
                    const img = change.target;
                    if (change.isIntersecting) {
                        console.log('ima.data', img.dataset)
                        img.src = img.dataset.src;
                        observer.unobserve(img);
                    }
                })

            })
            const images = document.querySelectorAll('.image img');
            images.forEach(image => {
                observer.observe(image);
            })
        }
        lazyLoad();
    </script>
</body>
</html>
