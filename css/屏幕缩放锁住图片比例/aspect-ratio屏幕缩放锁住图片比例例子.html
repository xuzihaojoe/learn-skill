<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>错误示范：图片会变形</title>
    <style>
        /* 模拟一个简单的卡片布局 */
        .card {
            width: 80%;          /* 宽度随屏幕缩放 */
            max-width: 600px;    /* 最大宽度 */
            margin: 20px auto;
            background: #fff;
            border: 1px solid #ccc;
            padding: 15px;
        }

        /*.card img {*/
        /*    width: 100%;        !* 宽度跟着卡片变 *!*/
        /*    height: 200px;      !* ❌ 致命伤：高度固定死 200px *!*/
        /*}*/
        .card img {
            width: 100%;          /* 1. 宽度随卡片变 */
            aspect-ratio: 16 / 9; /* 2. 核心：高度不需要写死，浏览器自动根据当前宽度算出 16:9 的高度 */
            object-fit: cover;    /* 3. 核心：画面等比裁剪，哪怕尺寸不一致也绝不压扁拉伸 */
        }
    </style>
</head>
<body style="background: #f0f0f0;">

<div class="card">
    <img src="../word_pg.png" alt="测试图片">
    <h3>❌ 错误示范：高度固定</h3>
    <p>请左右拉长或缩窄浏览器窗口！你会发现图片高度永远是 200px。当窗口很宽时，图片被横向拉长，里面的山水树木全被压扁了。</p>
</div>

</body>
</html>
