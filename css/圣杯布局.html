        /**
        grid写法
         */
        .box {
            display: grid;
            height: 100vh;
            width: 100%;
            grid-template-columns: 100px auto 100px;
            grid-template-rows: 100px auto 100px;
        }
        header, footer {
            background-color: skyblue;
        }
        aside {
            background-color: deepskyblue;
        }
        main {
            background-color: lightgrey;
        }
    </style>

<body>
    <div class="box">
        <header></header>
        <aside></aside>
        <main></main>
        <aside></aside>
        <footer></footer>
    </div>
