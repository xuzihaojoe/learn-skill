<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        /**
         * 动画分为两种：一种是过度动画Transation，一种是动画（主动）Animation
         * 过度动画：通过被动被影响属性的变化过程， 会进行一种渐变过程，就会出现动画
         */

        /**
            动画
            通过主动控制属性的变化过程，会进行一种渐变过程，就会出现动画
            animation: 动画名 持续时间 速度曲线 延迟时间 播放次数 播放方向(动画方向：normal(正常) / alternate(来回交替播放)) 填充模式;
            说一下填充模式：animation-fill-mode: none/forwards(结束保留最后一帧)/backwards（等待的时候提前应用第一帧）/both（forwards和backwards两个都要有）;
            播放方向(动画方向：normal(正常) ：如果用alternate就不用写个中间状态了，第一次他会到底部，第二次就会重新回来
         */
        @keyframes boxGo {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(300px, 300px);
                background: lightblue;
            }
        }
        /**
            过度动画
            通过被动被影响属性的变化的过程， 会进行一种渐变的过程，就会出现动画
            transition: 属性 时间 过度模式 延迟执行的时间
         */
        .box {
            width: 200px;
            height: 200px;
            background-color: red;
            transition: all 1s linear 500ms;
            animation: boxGo 5s linear 500ms infinite alternate forwards;
        }
        .box:hover {
            background-color: blue;
            width: 400px;
            height: 400px;
            border-radius: 50px;
        }


        /**
        形状变化
         */
        .box2 {
            transform: translate(300px, 300px);
            transform: rotate(180deg);
            trnansform: scale(2);
            transform: skew(20deg);
            transform-origin: left top;
        }


    </style>
</head>
<body>
    <div class="box"></div>
    <div class="box2"></div>
</body>
</html>
