<script>
    /**
     * 说一下这个css属性区别
     *
     * display: none;
     * 不显示，不能点击，不占空间；会导致reflow，和repaint
     * visibility: hidden;
     * 不显示，但是占位，不可靠点击；导致repaint
     * opacity: 0;
     * 不显示，但是占位，可点击；合成线程会操作CPU对独立图层进行矩阵变换
     */
</script>
