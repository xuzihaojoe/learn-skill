<script>
    /**
     * vw方案就是：
     * 1vm就是屏幕的内容宽度的1%，这个是css的标准，举例子说明：
     * 比如设置稿的宽度是375px，我们测试一个div的宽度是100px，那么我们写代码就写100px
     * 这个时候使用插件：postcss-px-to-viewport 进行转换，这个插件的功能就是 =》 你写代码100px，他会进行计算vw：100px / 375px * 100 = 25vw
     * 插件应该会有配置设计稿的宽度，只需要配置好就行了，这个比rem简单多了，这也是现代化的方案之一
     */
</script>
